<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Quest — 2 Vòng Chinh Phục</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#0a1a2b;
    --bg2:#0f2b3f;
    --panel:#102638;
    --panel-line: rgba(150,210,220,0.14);
    --teal:#2dd4bf;
    --teal-dim: rgba(45,212,191,0.18);
    --gold:#ffd166;
    --coral:#ff5d73;
    --green:#4ade80;
    --purple:#a78bfa;
    --ink:#eaf6f5;
    --ink-dim:#9fb8c2;
    --navy-deep:#061421;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(1100px 600px at 15% -10%, rgba(45,212,191,0.14), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(255,209,102,0.10), transparent 55%),
      linear-gradient(180deg, var(--bg1), var(--bg2) 60%, var(--navy-deep));
    font-family:'Inter', sans-serif;
    color: var(--ink);
    display:flex;
    justify-content:center;
    padding: 22px 14px 60px;
    overflow-x:hidden;
  }
  .sheet{ width:100%; max-width:660px; }

  /* ---- HUD ---- */
  .hud{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .logo{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: clamp(20px,5vw,28px);
    color:#fff;
    letter-spacing:0.5px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .logo .bolt{ color: var(--gold); text-shadow: 0 0 14px rgba(255,209,102,0.7); }
  .hud-stats{ display:flex; align-items:center; gap:10px; }
  .player-tag{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:13px;
    color: var(--teal);
    background: var(--teal-dim);
    border:1px solid rgba(45,212,191,0.4);
    padding:5px 12px;
    border-radius:20px;
  }
  .lives{ display:flex; gap:3px; font-size:17px; filter: drop-shadow(0 0 6px rgba(255,93,115,0.5)); }
  .life.lost{ opacity:0.25; filter:none; }
  .score-badge{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:15px;
    background: linear-gradient(135deg, rgba(255,209,102,0.16), rgba(255,209,102,0.05));
    border:1px solid rgba(255,209,102,0.4);
    color: var(--gold);
    padding:6px 14px;
    border-radius: 20px;
    display:flex;
    align-items:center;
    gap:6px;
  }

  /* ---- CARD ---- */
  .card{
    position:relative;
    background: linear-gradient(180deg, rgba(20,45,63,0.9), rgba(12,32,46,0.95));
    border: 1px solid var(--panel-line);
    border-radius: 20px;
    padding: 26px 24px 24px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.2), 0 24px 60px -20px rgba(0,0,0,0.6), 0 0 40px -18px rgba(45,212,191,0.35);
    overflow:hidden;
  }
  .card.shake{ animation: shake 0.4s; }
  @keyframes shake{
    10%,90%{ transform: translateX(-2px); }
    20%,80%{ transform: translateX(4px); }
    30%,50%,70%{ transform: translateX(-8px); }
    40%,60%{ transform: translateX(8px); }
  }

  .top-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'Baloo 2', sans-serif;
    font-size:13px;
    color: var(--ink-dim);
    margin-bottom:10px;
    gap:8px;
    flex-wrap:wrap;
  }
  .level-tag{
    background: var(--teal-dim);
    color: var(--teal);
    border:1px solid rgba(45,212,191,0.4);
    padding:3px 10px;
    border-radius:20px;
    font-weight:700;
    letter-spacing:0.5px;
  }
  .round-tag{
    background: rgba(167,139,250,0.15);
    color: var(--purple);
    border:1px solid rgba(167,139,250,0.4);
    padding:3px 10px;
    border-radius:20px;
    font-weight:700;
    letter-spacing:0.5px;
  }
  .speed-tag{ font-weight:700; color: var(--gold); opacity:0; transform: translateY(4px); transition: opacity .25s, transform .25s; }
  .speed-tag.show{ opacity:1; transform:translateY(0); }

  .timer-track{ height:8px; border-radius:6px; background: rgba(255,255,255,0.06); overflow:hidden; margin-bottom:20px; }
  .timer-fill{ height:100%; width:100%; background: linear-gradient(90deg, var(--teal), var(--green)); transition: width 0.2s linear, background 0.3s; }
  .timer-fill.warn{ background: linear-gradient(90deg, var(--gold), #ffb020); }
  .timer-fill.danger{ background: linear-gradient(90deg, var(--coral), #ff2e51); }

  .quest-label{ font-family:'Baloo 2', sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color: var(--teal); margin-bottom:8px; }
  .prompt-main{ font-family:'Baloo 2', sans-serif; font-size: clamp(24px,5.6vw,32px); font-weight:800; color:#fff; line-height:1.28; margin-bottom:4px; }
  .prompt-ipa{ font-size:14px; color: var(--ink-dim); margin-bottom:6px; }
  .prompt-context{ font-size:14.5px; color:#cfe3e0; font-style: italic; background: rgba(255,255,255,0.03); border-left:3px solid var(--gold); padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 10px 0 22px; }

  .options{ display:flex; flex-direction:column; gap:11px; }
  .opt{
    display:flex; align-items:center; gap:13px; width:100%; text-align:left;
    font-family:'Inter', sans-serif; font-size:16px; font-weight:700; color: var(--ink);
    background: rgba(255,255,255,0.03); border:1.5px solid var(--panel-line); border-radius:12px;
    padding:13px 15px; cursor:pointer; transition: border-color .15s, background .15s, transform .08s;
  }
  .opt:hover:not(:disabled){ border-color: var(--teal); background: rgba(45,212,191,0.08); transform: translateX(2px); }
  .opt:active:not(:disabled){ transform: scale(0.98); }
  .opt-letter{
    flex:0 0 auto; width:28px; height:28px; border-radius:8px; border:1.5px solid rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center; font-family:'Baloo 2', sans-serif; font-weight:700; font-size:13px; color: var(--ink-dim);
  }
  .opt.correct{ border-color: var(--green); background: rgba(74,222,128,0.14); }
  .opt.correct .opt-letter{ background: var(--green); border-color: var(--green); color:#06210f; }
  .opt.wrong{ border-color: var(--coral); background: rgba(255,93,115,0.14); }
  .opt.wrong .opt-letter{ background: var(--coral); border-color: var(--coral); color:#2a0509; }
  .opt:disabled{ cursor:default; }
  .opt:disabled:not(.correct):not(.wrong){ opacity:0.4; }

  .feedback{ font-family:'Baloo 2', sans-serif; font-size:15px; font-weight:700; min-height:22px; margin-top:16px; }
  .feedback .ipa{ font-family:'Inter', sans-serif; font-weight:400; color: var(--ink-dim); font-size:13px; }
  .feedback.good{ color: var(--green); }
  .feedback.bad{ color: var(--coral); }

  .footer-row{ display:flex; justify-content:flex-end; margin-top:16px; }
  .next-btn{
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:15px; color:#062018;
    background: linear-gradient(135deg, var(--teal), #21b8a4); border:none; border-radius:10px;
    padding:12px 24px; cursor:pointer; opacity:0; pointer-events:none;
    box-shadow: 0 8px 20px -8px rgba(45,212,191,0.6); transition: opacity .2s, transform .1s;
  }
  .next-btn.show{ opacity:1; pointer-events:auto; }
  .next-btn:active{ transform: scale(0.97); }

  .confetti-piece{ position:absolute; top:40%; left:50%; width:8px; height:8px; border-radius:2px; opacity:0.95; pointer-events:none; animation: pop 0.9s ease-out forwards; }
  @keyframes pop{ 0%{ transform: translate(0,0) rotate(0deg) scale(1); opacity:1; } 100%{ transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.6); opacity:0; } }

  .result-screen{ text-align:center; padding: 8px 2px 4px; }
  .result-badge{ font-size:56px; margin-bottom:6px; filter: drop-shadow(0 0 20px rgba(255,209,102,0.5)); }
  .result-rank{ font-family:'Baloo 2', sans-serif; font-weight:800; font-size: clamp(22px,5vw,30px); color:#fff; }
  .result-score{ font-family:'Baloo 2', sans-serif; font-size:44px; font-weight:800; color: var(--gold); margin: 8px 0 0; }
  .result-label{ font-family:'Baloo 2', sans-serif; font-size:12px; color: var(--ink-dim); letter-spacing:1.5px; text-transform:uppercase; }
  .result-msg{ font-size:15.5px; color:#cfe3e0; margin: 14px auto 22px; max-width: 440px; }
  .btn-row{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .restart-btn{
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:15px; color:#fff;
    background: rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.25); border-radius:10px;
    padding:12px 24px; cursor:pointer;
  }
  .restart-btn:hover{ background: rgba(255,255,255,0.1); }
  .restart-btn.primary{ background: linear-gradient(135deg, var(--teal), #21b8a4); border:none; color:#062018; }

  .review-list{ text-align:left; margin-top: 22px; border-top: 1px dashed var(--panel-line); padding-top: 14px; font-size: 13.5px; }
  .review-item{ display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .review-en{ font-weight:700; color: var(--coral); font-family:'Baloo 2', sans-serif; }
  .review-vn{ color: var(--ink-dim); }

  /* ---- Leaderboard ---- */
  .leaderboard{ text-align:left; margin-top: 22px; border-top: 1px dashed var(--panel-line); padding-top: 16px; }
  .leaderboard h3{
    font-family:'Baloo 2', sans-serif; font-size:14px; letter-spacing:1px; text-transform:uppercase;
    color: var(--gold); margin: 0 0 12px; display:flex; align-items:center; gap:6px;
  }
  .lb-row{
    display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px;
    font-size:13.5px; margin-bottom:4px; background: rgba(255,255,255,0.02);
  }
  .lb-row.me{ background: rgba(255,209,102,0.12); border:1px solid rgba(255,209,102,0.35); }
  .lb-rank{ font-family:'Baloo 2', sans-serif; font-weight:800; width:22px; color: var(--ink-dim); }
  .lb-row:nth-child(1) .lb-rank{ color:#ffd166; }
  .lb-row:nth-child(2) .lb-rank{ color:#cfd8dc; }
  .lb-row:nth-child(3) .lb-rank{ color:#d99a5b; }
  .lb-name{ flex:1; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lb-score{ font-family:'Baloo 2', sans-serif; font-weight:700; color: var(--teal); }
  .lb-empty{ font-size:13px; color: var(--ink-dim); font-style:italic; }
  .lb-loading{ font-size:13px; color: var(--ink-dim); }

  /* ---- Start Modal ---- */
  .modal-overlay{
    position:fixed; inset:0; background: rgba(4,12,20,0.82); backdrop-filter: blur(4px);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:16px;
  }
  .modal-card{
    width:100%; max-width: 440px;
    background: linear-gradient(180deg, rgba(20,45,63,0.97), rgba(9,24,36,0.99));
    border: 1px solid var(--panel-line); border-radius: 20px; padding: 30px 26px 26px;
    box-shadow: 0 30px 70px -20px rgba(0,0,0,0.7), 0 0 50px -18px rgba(45,212,191,0.4);
    text-align:center;
    max-height: 88vh; overflow-y:auto;
  }
  .modal-title{
    font-family:'Baloo 2', sans-serif; font-weight:800; font-size: clamp(24px,6vw,30px); color:#fff;
    display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:6px;
  }
  .modal-sub{ font-size:14px; color: var(--ink-dim); margin-bottom:22px; line-height:1.5; }
  .modal-input{
    width:100%; font-family:'Inter', sans-serif; font-size:15px; font-weight:600; color:#fff;
    background: rgba(255,255,255,0.05); border: 1.5px solid var(--panel-line); border-radius:10px;
    padding:13px 15px; outline:none; margin-bottom:14px; transition: border-color .15s;
  }
  .modal-input::placeholder{ color: var(--ink-dim); }
  .modal-input:focus{ border-color: var(--teal); }
  .modal-hint{ font-size:12px; color: var(--coral); min-height:16px; margin: -6px 0 12px; text-align:left; }
  .start-btn{
    width:100%; font-family:'Baloo 2', sans-serif; font-weight:700; font-size:16px; color:#062018;
    background: linear-gradient(135deg, var(--teal), #21b8a4); border:none; border-radius:12px;
    padding:14px 24px; cursor:pointer; box-shadow: 0 10px 24px -10px rgba(45,212,191,0.6);
    transition: transform .1s;
  }
  .start-btn:active{ transform: scale(0.98); }
  .modal-rules{
    display:flex; justify-content:center; gap:14px; margin: 18px 0 4px; font-size:11.5px; color: var(--ink-dim);
    font-family:'Baloo 2', sans-serif; flex-wrap:wrap;
  }
  .modal-rules span{ display:flex; align-items:center; gap:5px; }
  .rounds-preview{
    display:flex; gap:8px; margin: 16px 0 0; text-align:left;
  }
  .round-chip{
    flex:1; background: rgba(255,255,255,0.04); border:1px solid var(--panel-line); border-radius:10px;
    padding:10px 12px; font-family:'Baloo 2', sans-serif;
  }
  .round-chip .rc-title{ font-size:12px; color: var(--purple); font-weight:700; margin-bottom:2px; }
  .round-chip .rc-desc{ font-size:11px; color: var(--ink-dim); font-family:'Inter', sans-serif; }
</style>
</head>
<body>
<div class="sheet">
  <div class="hud">
    <div class="logo"><span class="bolt">⚡</span>VOCAB QUEST</div>
    <div class="hud-stats">
      <span class="player-tag" id="playerTag" style="display:none;"></span>
      <div class="lives" id="lives"></div>
      <div class="score-badge">🏆 <span id="scoreVal">0</span></div>
    </div>
  </div>
  <div class="card" id="card"></div>
</div>

<!-- Start popup -->
<div class="modal-overlay" id="startOverlay">
  <div class="modal-card">
    <div class="modal-title">⚡ VOCAB QUEST</div>
    <div class="modal-sub">Chinh phục 2 vòng từ vựng công sở. Trả lời càng nhanh, điểm càng cao!</div>
    <input type="text" class="modal-input" id="nameInput" placeholder="Nhập tên của bạn..." maxlength="20" autocomplete="off">
    <div class="modal-hint" id="nameHint"></div>
    <button class="start-btn" id="startBtn">🚀 Bắt đầu chơi</button>
    <div class="modal-rules">
      <span>❤️ 3 mạng</span>
      <span>⏱️ 15s / câu</span>
      <span>🔁 2 vòng</span>
    </div>
    <div class="rounds-preview">
      <div class="round-chip">
        <div class="rc-title">Vòng 1</div>
        <div class="rc-desc">Anh → Việt: đọc từ tiếng Anh, chọn nghĩa đúng</div>
      </div>
      <div class="round-chip">
        <div class="rc-title">Vòng 2</div>
        <div class="rc-desc">Việt → Anh: đọc nghĩa tiếng Việt, chọn từ đúng</div>
      </div>
    </div>
    <div class="leaderboard" id="modalLeaderboard">
      <h3>🏆 Bảng Xếp Hạng</h3>
      <div class="lb-loading">Đang tải...</div>
    </div>
  </div>
</div>

<script>
const FIREBASE_URL = "https://gametienganh-9af04-default-rtdb.asia-southeast1.firebasedatabase.app";

/* ---------------- Vocabulary: Daily Routines ---------------- */
const ROUTINES = [
  {en:"arrive at work", ipa:"/əˈraɪv ət wɜːrk/", vn:"đến nơi làm việc", ex:"She arrived at work at 7:45 yesterday.", vnEx:"Cô ấy đến chỗ làm lúc 7:45 hôm qua."},
  {en:"check email", ipa:"/tʃek ˈiːmeɪl/", vn:"kiểm tra email", ex:"I checked my email before the meeting.", vnEx:"Tôi đã kiểm tra email trước cuộc họp."},
  {en:"reply to emails", ipa:"/rɪˈplaɪ tuː ˈiːmeɪlz/", vn:"trả lời email", ex:"He replied to three emails this morning.", vnEx:"Anh ấy đã trả lời ba email sáng nay."},
  {en:"make a phone call", ipa:"/meɪk ə foʊn kɔːl/", vn:"gọi điện thoại", ex:"She made a phone call to the client.", vnEx:"Cô ấy đã gọi điện cho khách hàng."},
  {en:"answer the phone", ipa:"/ˈænsər ðə foʊn/", vn:"nghe điện thoại", ex:"I answered the phone twice during lunch.", vnEx:"Tôi đã nghe điện thoại hai lần trong giờ ăn trưa."},
  {en:"schedule an appointment", ipa:"/ˈskedʒuːl ən əˈpɔɪntmənt/", vn:"sắp xếp cuộc hẹn", ex:"We scheduled an appointment for Monday.", vnEx:"Chúng tôi đã sắp xếp một cuộc hẹn vào thứ Hai."},
  {en:"attend a meeting", ipa:"/əˈtend ə ˈmiːtɪŋ/", vn:"tham dự cuộc họp", ex:"They attended a meeting at 9 a.m.", vnEx:"Họ đã tham dự cuộc họp lúc 9 giờ sáng."},
  {en:"take notes", ipa:"/teɪk noʊts/", vn:"ghi chú", ex:"The assistant took notes during the call.", vnEx:"Trợ lý đã ghi chú trong cuộc gọi."},
  {en:"prepare a report", ipa:"/prɪˈper ə rɪˈpɔːrt/", vn:"chuẩn bị báo cáo", ex:"He prepared a report last night.", vnEx:"Anh ấy đã chuẩn bị báo cáo tối qua."},
  {en:"submit a report", ipa:"/səbˈmɪt ə rɪˈpɔːrt/", vn:"nộp báo cáo", ex:"She submitted the report on time.", vnEx:"Cô ấy đã nộp báo cáo đúng hạn."},
  {en:"review documents", ipa:"/rɪˈvjuː ˈdɑːkjəmənts/", vn:"xem xét/xem lại tài liệu", ex:"The manager reviewed the documents carefully.", vnEx:"Quản lý đã xem xét tài liệu cẩn thận."},
  {en:"file paperwork", ipa:"/faɪl ˈpeɪpərwɜːrk/", vn:"sắp xếp/lưu hồ sơ", ex:"She filed all the paperwork yesterday.", vnEx:"Cô ấy đã sắp xếp toàn bộ hồ sơ hôm qua."},
  {en:"print documents", ipa:"/prɪnt ˈdɑːkjəmənts/", vn:"in tài liệu", ex:"He printed the documents for the meeting.", vnEx:"Anh ấy đã in tài liệu cho cuộc họp."},
  {en:"make copies", ipa:"/meɪk ˈkɑːpiz/", vn:"photocopy / sao chụp", ex:"I made copies of the contract.", vnEx:"Tôi đã photocopy hợp đồng."},
  {en:"send a package", ipa:"/send ə ˈpækɪdʒ/", vn:"gửi bưu kiện", ex:"We sent a package to the branch office.", vnEx:"Chúng tôi đã gửi bưu kiện đến chi nhánh."},
  {en:"receive an order", ipa:"/rɪˈsiːv ən ˈɔːrdər/", vn:"nhận đơn đặt hàng", ex:"The shop received an order for 100 units.", vnEx:"Cửa hàng đã nhận một đơn đặt hàng 100 sản phẩm."},
  {en:"serve", ipa:"/sɜːrv/", vn:"phục vụ", ex:"He served customers all afternoon.", vnEx:"Anh ấy đã phục vụ khách hàng suốt cả buổi chiều."},
  {en:"solve a problem", ipa:"/sɑːlv ə ˈprɑːbləm/", vn:"giải quyết vấn đề", ex:"The IT team solved the problem quickly.", vnEx:"Đội IT đã giải quyết vấn đề nhanh chóng."},
  {en:"finish a project", ipa:"/ˈfɪnɪʃ ə ˈprɑːdʒekt/", vn:"hoàn thành dự án", ex:"We finished the project two days early.", vnEx:"Chúng tôi đã hoàn thành dự án sớm 2 ngày."},
  {en:"work overtime", ipa:"/wɜːrk ˈoʊvərtaɪm/", vn:"tăng ca / làm thêm giờ", ex:"He worked overtime to meet the deadline.", vnEx:"Anh ấy đã tăng ca để kịp hạn chót."}
];

/* ---------------- Vocabulary: Nghề Nghiệp (Jobs) ---------------- */
const JOBS = [
  {en:"accountant", ipa:"/əˈkaʊntənt/", vn:"kế toán", ex:"The chief accountant is reviewing the quarterly financial statements right now.", vnEx:"Kế toán trưởng hiện đang soát xét các báo cáo tài chính quý."},
  {en:"representative", ipa:"/reprɪˈzentətɪv/", vn:"người đại diện", ex:"An authorized representative from our firm is meeting with the client this afternoon.", vnEx:"Một người đại diện được ủy quyền từ công ty chúng tôi sẽ gặp khách hàng vào chiều nay."},

  {en:"director", ipa:"/daɪˈrektə(r)/", vn:"giám đốc", ex:"The board of directors is voting on the budget proposal at this exact moment.", vnEx:"Hội đồng quản trị đang bỏ phiếu về đề xuất ngân sách vào ngay chính thời điểm này."},

  {en:"inspector", ipa:"/ɪnˈspektə(r)/", vn:"thanh tra viên", ex:"A safety inspector is checking the emergency exits in the manufacturing plant today.", vnEx:"Một thanh tra viên an toàn đang kiểm tra các lối thoát hiểm trong nhà máy sản xuất ngày hôm nay."},
  {en:"intern", ipa:"/ˈɪntɜːn/", vn:"thực tập sinh", ex:"The new intern is making copies of the meeting agenda in the supply room.", vnEx:"Thực tập sinh mới đang sao chụp các nội dung cuộc họp trong phòng vật tư."},
  {en:"assistant", ipa:"/əˈsɪstənt/", vn:"trợ lý", ex:"The administrative assistant is organizing the file cabinet drawers this morning.", vnEx:"Trợ lý hành chính đang sắp xếp các ngăn kéo tủ hồ sơ vào sáng nay."},
  {en:"supervisor", ipa:"/ˈsuːpəvaɪzə(r)/", vn:"người giám sát", ex:"Your immediate supervisor is evaluating your workplace performance this week.", vnEx:"Người giám sát trực tiếp của bạn đang đánh giá hiệu suất làm việc của bạn trong tuần này."},
  {en:"client", ipa:"/ˈklaɪənt/", vn:"khách hàng (sử dụng dịch vụ)", ex:"Our sales team is treating a prospective client to lunch at a local restaurant.", vnEx:"Đội ngũ bán hàng của chúng tôi đang mời một khách hàng tiềm năng ăn trưa tại một nhà hàng địa phương."},
  {en:"colleague", ipa:"/ˈkɒliːɡ/", vn:"đồng nghiệp", ex:"She is discussing the project timeline with her colleagues in the conference room.", vnEx:"Cô ấy đang thảo luận về tiến độ dự án với các đồng nghiệp của mình trong phòng họp."},

  {en:"supplier", ipa:"/səˈplaɪə(r)/", vn:"nhà cung cấp", ex:"Our primary manufacturing supplier is shipping the raw materials via air freight.", vnEx:"Nhà cung cấp sản xuất chính của chúng tôi đang vận chuyển nguyên liệu thô bằng đường hàng không."},
  {en:"operator", ipa:"/ˈɒpəreɪtə(r)/", vn:"người vận hành máy", ex:"The factory machine operator is wearing safety equipment while managing the assembly line.", vnEx:"Người vận hành máy móc nhà máy đang đeo thiết bị bảo hộ trong khi quản lý dây chuyền lắp ráp."},
  {en:"administrator", ipa:"/ədˈmɪnɪstreɪtə(r)/", vn:"quản trị viên", ex:"The network administrator is upgrading the company's internal security database today.", vnEx:"Quản trị mạng đang nâng cấp cơ sở dữ liệu bảo mật nội bộ của công ty ngày hôm nay."},
  {en:"candidate", ipa:"/ˈkændɪdeɪt/", vn:"ứng viên", ex:"The human resources department is interviewing three qualified candidates for the position.", vnEx:"Phòng nhân sự đang phỏng vấn ba ứng viên đủ năng lực cho vị trí công việc."},
  {en:"personnel", ipa:"/ˌpɜːsəˈnel/", vn:"nhân sự", ex:"Only authorized personnel are entering the secure server room on the ground floor.", vnEx:"Chỉ những nhân sự có thẩm quyền mới được vào phòng máy chủ bảo mật ở tầng trệt."}
];

const ALL_VOCAB = ROUTINES.concat(JOBS);

const ROUNDS = [
  { key:'en2vn', label:'Vòng 1 · Anh → Việt' },
  { key:'vn2en', label:'Vòng 2 · Việt → Anh' }
];

const LETTERS = ["A","B","C","D"];
const MAX_LIVES = 3;
const TIME_LIMIT = 15000;
const CONFETTI_COLORS = ['#2dd4bf','#ffd166','#4ade80','#ff5d73','#8ecae6'];

let roundIndex = 0, roundOrder = [], current = 0, score = 0, lives = MAX_LIVES, answered = false;
let results = [];
let timerInterval = null, timeLeft = TIME_LIMIT;
let playerName = "";

// ---- beep feedback ----
let audioCtx = null;
function beep(freq, dur, type='sine'){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  }catch(e){}
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildOptions(correctItem, key){
  const pool = ALL_VOCAB.filter(v => v[key] !== correctItem[key]);
  const distractors = shuffle(pool).slice(0,3).map(v=>v[key]);
  return shuffle([correctItem[key], ...distractors]);
}

/* ---------------- Firebase leaderboard ---------------- */
async function fetchLeaderboard(){
  try{
    const res = await fetch(`${FIREBASE_URL}/scores.json`);
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    if(!data) return [];
    return Object.values(data)
      .filter(e => e && typeof e.score === 'number' && e.name)
      .sort((a,b) => b.score - a.score)
      .slice(0, 10);
  }catch(e){
    return null;
  }
}

async function saveScore(name, scoreVal, correctCount, total){
  try{
    await fetch(`${FIREBASE_URL}/scores.json`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name: name,
        score: scoreVal,
        correct: correctCount,
        total: total,
        date: new Date().toISOString()
      })
    });
  }catch(e){ /* fail silently */ }
}

function renderLeaderboardInto(container, list, highlightName){
  if(list === null){
    container.innerHTML = `<h3>🏆 Bảng Xếp Hạng</h3><div class="lb-empty">Không tải được bảng xếp hạng (kiểm tra kết nối mạng).</div>`;
    return;
  }
  if(!list.length){
    container.innerHTML = `<h3>🏆 Bảng Xếp Hạng</h3><div class="lb-empty">Chưa có điểm nào. Hãy là người đầu tiên!</div>`;
    return;
  }
  const rows = list.map((e, i) => `
    <div class="lb-row ${e.name === highlightName ? 'me' : ''}">
      <span class="lb-rank">${i+1}</span>
      <span class="lb-name">${escapeHtml(e.name)}</span>
      <span class="lb-score">${e.score} ★</span>
    </div>
  `).join('');
  container.innerHTML = `<h3>🏆 Bảng Xếp Hạng</h3>${rows}`;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function loadModalLeaderboard(){
  const container = document.getElementById('modalLeaderboard');
  const list = await fetchLeaderboard();
  renderLeaderboardInto(container, list, null);
}

/* ---------------- Start modal ---------------- */
const startOverlay = document.getElementById('startOverlay');
const nameInput = document.getElementById('nameInput');
const nameHint = document.getElementById('nameHint');
const startBtn = document.getElementById('startBtn');
const playerTag = document.getElementById('playerTag');

loadModalLeaderboard();

nameInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') startBtn.click(); });

startBtn.addEventListener('click', () => {
  const val = nameInput.value.trim();
  if(!val){
    nameHint.textContent = "Vui lòng nhập tên của bạn để lưu điểm cao nhé!";
    nameInput.focus();
    return;
  }
  playerName = val.slice(0, 20);
  nameHint.textContent = "";
  playerTag.textContent = "👤 " + playerName;
  playerTag.style.display = "inline-block";
  startOverlay.style.display = "none";
  startQuiz();
});

/* ---------------- Game logic ---------------- */
function renderLives(){
  const el = document.getElementById('lives');
  el.innerHTML = '';
  for(let i=0;i<MAX_LIVES;i++){
    const span = document.createElement('span');
    span.className = 'life' + (i >= lives ? ' lost' : '');
    span.textContent = '❤️';
    el.appendChild(span);
  }
}

function updateScoreBadge(){ document.getElementById('scoreVal').textContent = score; }

function startQuiz(){
  roundIndex = 0; score = 0; lives = MAX_LIVES; results = [];
  renderLives();
  updateScoreBadge();
  startRound();
}

function startRound(){
  roundOrder = shuffle(ALL_VOCAB);
  current = 0;
  renderQuestion();
}

function stopTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval = null; } }

function renderQuestion(){
  answered = false;
  const direction = ROUNDS[roundIndex].key; // 'en2vn' or 'vn2en'
  const key = direction === 'en2vn' ? 'vn' : 'en';
  const item = roundOrder[current];
  const options = buildOptions(item, key);
  const correctValue = item[key];
  const card = document.getElementById('card');

  const questLabel = direction === 'en2vn' ? 'Chọn nghĩa tiếng Việt phù hợp' : 'Chọn cụm từ tiếng Anh phù hợp';
  const mainHtml = direction === 'en2vn'
    ? `<div class="prompt-main">${item.en}</div><div class="prompt-ipa">${item.ipa}</div><div class="prompt-context">${item.ex}</div>`
    : `<div class="prompt-main">${item.vn}</div><div class="prompt-context">${item.vnEx}</div>`;

  card.innerHTML = `
    <div class="top-row">
      <span class="round-tag">${ROUNDS[roundIndex].label}</span>
      <span class="level-tag">Câu ${current+1} / ${roundOrder.length}</span>
      <span class="speed-tag" id="speedTag">⚡ Nhanh = điểm cao!</span>
    </div>
    <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
    <div class="quest-label">${questLabel}</div>
    ${mainHtml}
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="footer-row"><button class="next-btn" id="nextBtn">Câu tiếp theo →</button></div>
  `;

  document.getElementById('speedTag').classList.add('show');

  const optionsDiv = document.getElementById('options');
  options.forEach((optText, idx) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[idx]}</span><span>${optText}</span>`;
    btn.onclick = () => selectAnswer(btn, optText, correctValue, item, direction);
    optionsDiv.appendChild(btn);
  });

  document.getElementById('nextBtn').onclick = nextQuestion;
  runTimer();
}

function runTimer(){
  stopTimer();
  timeLeft = TIME_LIMIT;
  const fill = document.getElementById('timerFill');
  const startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    timeLeft = TIME_LIMIT - elapsed;
    const pct = Math.max(0, (timeLeft / TIME_LIMIT) * 100);
    fill.style.width = pct + '%';
    fill.classList.toggle('warn', pct <= 50 && pct > 20);
    fill.classList.toggle('danger', pct <= 20);
    if(timeLeft <= 0){
      stopTimer();
      if(!answered) timeoutAnswer();
    }
  }, 80);
}

function timeoutAnswer(){
  answered = true;
  const direction = ROUNDS[roundIndex].key;
  const key = direction === 'en2vn' ? 'vn' : 'en';
  const item = roundOrder[current];
  const correctValue = item[key];
  loseLife();
  results.push({en: item.en, vn: item.vn, correct:false, round: roundIndex+1});

  document.querySelectorAll('#options .opt').forEach(opt => {
    opt.disabled = true;
    const text = opt.querySelector('span:last-child').textContent;
    if(text === correctValue) opt.classList.add('correct');
  });
  const fb = document.getElementById('feedback');
  fb.innerHTML = `⏰ Hết giờ! Đáp án đúng: <strong>${correctValue}</strong> ${direction === 'vn2en' ? `<span class="ipa">${item.ipa}</span>` : ''}`;
  fb.className = 'feedback bad';
  document.getElementById('card').classList.add('shake');
  setTimeout(()=>document.getElementById('card').classList.remove('shake'), 400);
  beep(180, 0.3, 'sawtooth');

  if(lives <= 0){ setTimeout(() => endGame(false), 700); }
  else { document.getElementById('nextBtn').classList.add('show'); }
}

function loseLife(){ lives = Math.max(0, lives - 1); renderLives(); }

function spawnConfetti(container){
  for(let i=0;i<26;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random()*120;
    p.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
    p.style.setProperty('--rot', (Math.random()*360-180) + 'deg');
    p.style.background = CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
    p.style.left = (45 + Math.random()*10) + '%';
    container.appendChild(p);
    setTimeout(()=>p.remove(), 950);
  }
}

function computeSpeedScore(){
  const pct = Math.max(0, timeLeft / TIME_LIMIT);
  return Math.max(10, Math.round(pct * 100));
}

function speedMessage(bonus){
  if(bonus >= 85) return "Cực nhanh! ⚡⚡⚡";
  if(bonus >= 60) return "Nhanh tay! ⚡⚡";
  if(bonus >= 30) return "Khá ổn ⚡";
  return "Vừa kịp lúc!";
}

function selectAnswer(btn, chosenValue, correctValue, item, direction){
  if(answered) return;
  answered = true;
  stopTimer();
  const isCorrect = chosenValue === correctValue;
  results.push({en: item.en, vn: item.vn, correct: isCorrect, round: roundIndex+1});

  document.querySelectorAll('#options .opt').forEach(opt => {
    opt.disabled = true;
    const text = opt.querySelector('span:last-child').textContent;
    if(text === correctValue) opt.classList.add('correct');
    else if(opt === btn) opt.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  const card = document.getElementById('card');
  const ipaHtml = direction === 'vn2en' ? ` <span class="ipa">${item.ipa}</span>` : '';

  if(isCorrect){
    const bonus = computeSpeedScore();
    score += bonus;
    updateScoreBadge();
    fb.innerHTML = `✓ Chính xác! +${bonus} điểm — ${speedMessage(bonus)}${ipaHtml}`;
    fb.className = 'feedback good';
    spawnConfetti(card);
    beep(660, 0.18);
  } else {
    loseLife();
    fb.innerHTML = `✗ Chưa đúng. Đáp án đúng: <strong>${correctValue}</strong>${ipaHtml}`;
    fb.className = 'feedback bad';
    card.classList.add('shake');
    setTimeout(()=>card.classList.remove('shake'), 400);
    beep(180, 0.3, 'sawtooth');
  }

  if(!isCorrect && lives <= 0){
    setTimeout(() => endGame(false), 700);
  } else {
    document.getElementById('nextBtn').classList.add('show');
  }
}

function nextQuestion(){
  current++;
  if(current >= roundOrder.length){
    if(roundIndex >= ROUNDS.length - 1){
      endGame(true);
    } else {
      renderRoundComplete();
    }
  } else {
    renderQuestion();
  }
}

function renderRoundComplete(){
  stopTimer();
  const card = document.getElementById('card');
  const roundResults = results.filter(r => r.round === roundIndex+1);
  const correctInRound = roundResults.filter(r=>r.correct).length;

  card.innerHTML = `
    <div class="result-screen">
      <div class="result-badge">🎉</div>
      <div class="result-rank">Hoàn thành ${ROUNDS[roundIndex].label}!</div>
      <div class="result-label">Điểm số hiện tại</div>
      <div class="result-score">${score} ★</div>
      <div class="result-msg">${escapeHtml(playerName)} trả lời đúng ${correctInRound}/${roundOrder.length} câu ở vòng này. ${lives} mạng còn lại. Sẵn sàng cho ${ROUNDS[roundIndex+1].label}?</div>
      <div class="btn-row">
        <button class="restart-btn primary" id="continueBtn">${ROUNDS[roundIndex+1].label} →</button>
      </div>
    </div>
  `;
  spawnConfetti(card);
  document.getElementById('continueBtn').onclick = () => {
    roundIndex++;
    startRound();
  };
}

function rankFor(pct){
  if(pct === 100) return {badge:'👑', rank:'Bậc Thầy Từ Vựng'};
  if(pct >= 80) return {badge:'🥇', rank:'Chuyên Viên Xuất Sắc'};
  if(pct >= 60) return {badge:'🥈', rank:'Nhân Viên Chăm Chỉ'};
  if(pct >= 40) return {badge:'🥉', rank:'Thực Tập Sinh Tiềm Năng'};
  return {badge:'🌱', rank:'Người Mới Bắt Đầu'};
}

function renderReview(){
  const missed = results.filter(r => !r.correct);
  if(!missed.length) return '';
  return `
    <div class="review-list">
      ${missed.map(m => `
        <div class="review-item">
          <span class="review-en">${m.en}</span>
          <span class="review-vn">${m.vn}</span>
        </div>
      `).join('')}
    </div>
  `;
}

async function endGame(finished){
  stopTimer();
  const card = document.getElementById('card');
  const correctCount = results.filter(r=>r.correct).length;
  const totalPlayed = results.length;

  if(finished){
    const pct = Math.round((correctCount/totalPlayed)*100);
    const {badge, rank} = rankFor(pct);
    card.innerHTML = `
      <div class="result-screen">
        <div class="result-badge">${badge}</div>
        <div class="result-rank">${rank}</div>
        <div class="result-label">Điểm số cuối cùng — Hoàn thành cả 2 vòng!</div>
        <div class="result-score">${score} ★</div>
        <div class="result-msg">${escapeHtml(playerName)} trả lời đúng ${correctCount}/${totalPlayed} câu (${pct}%). ${lives} mạng còn lại.</div>
        <div class="btn-row">
          <button class="restart-btn primary" id="restartBtn">🔄 Chơi lại</button>
          <button class="restart-btn" id="homeBtn">🏠 Màn hình chính</button>
        </div>
        <div class="leaderboard" id="resultLeaderboard"><div class="lb-loading">Đang lưu điểm...</div></div>
        ${renderReview()}
      </div>
    `;
    spawnConfetti(card);
  } else {
    card.innerHTML = `
      <div class="result-screen">
        <div class="result-badge">💥</div>
        <div class="result-rank">Hết Mạng Rồi!</div>
        <div class="result-label">Điểm số</div>
        <div class="result-score">${score} ★</div>
        <div class="result-msg">${escapeHtml(playerName)} trả lời đúng ${correctCount}/${totalPlayed} câu (${ROUNDS[roundIndex].label}) trước khi hết mạng. Thử lại để phá kỷ lục nhé!</div>
        <div class="btn-row">
          <button class="restart-btn primary" id="restartBtn">🔄 Chơi lại</button>
          <button class="restart-btn" id="homeBtn">🏠 Màn hình chính</button>
        </div>
        <div class="leaderboard" id="resultLeaderboard"><div class="lb-loading">Đang lưu điểm...</div></div>
        ${renderReview()}
      </div>
    `;
  }

  document.getElementById('restartBtn').onclick = startQuiz;
  document.getElementById('homeBtn').onclick = () => {
    startOverlay.style.display = "flex";
    loadModalLeaderboard();
  };

  await saveScore(playerName, score, correctCount, totalPlayed);
  const list = await fetchLeaderboard();
  const lbContainer = document.getElementById('resultLeaderboard');
  if(lbContainer) renderLeaderboardInto(lbContainer, list, playerName);
}
</script>
